<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Nodes - Vault</title>
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .container {
            margin-top: 2rem;
        }
        
        .node-type-filter {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Graph Nodes</h1>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="node-type-filter">
                    <label for="nodeTypeFilter" class="form-label">Filter by Node Type:</label>
                    <select id="nodeTypeFilter" class="form-select">
                        <option value="">All Types</option>
                        <option value="Protein">Protein</option>
                        <option value="Gene">Gene</option>
                        <option value="Genome">Genome</option>
                        <option value="Contig">Contig</option>
                        <!-- Add more node types as needed -->
                    </select>
                </div>
            </div>
        </div>
        
        <table id="nodesTable" class="table table-striped table-bordered" style="width:100%">
            <thead>
                <tr>
                    <th>Key</th>
                    <th>Element ID</th>
                    <th>Type</th>
                    <th>Labels</th>
                    <th>Properties</th>
                    <th>Created At</th>
                </tr>
            </thead>
        </table>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        $(document).ready(function() {
            var table = $('#nodesTable').DataTable({
                "processing": true,
                "serverSide": true,
                "ajax": {
                    "url": "/graph/node/page",
                    "type": "GET",
                    "data": function(d) {
                        // Add custom parameters
                        d.nodeType = $('#nodeTypeFilter').val();
                        return d;
                    }
                },
                "columns": [
                    { 
                        "data": "entry",
                        "title": "Key"
                    },
                    { 
                        "data": "elementId",
                        "title": "Element ID",
                        "render": function(data, type, row) {
                            return data ? data.substring(0, 20) + '...' : '';
                        }
                    },
                    { 
                        "data": "type",
                        "title": "Type"
                    },
                    { 
                        "data": "labels",
                        "title": "Labels",
                        "render": function(data, type, row) {
                            if (data && Array.isArray(data)) {
                                return data.join(', ');
                            }
                            return '';
                        }
                    },
                    { 
                        "data": "properties",
                        "title": "Properties",
                        "render": function(data, type, row) {
                            if (data && typeof data === 'object') {
                                var props = [];
                                for (var key in data) {
                                    if (data.hasOwnProperty(key) && !key.startsWith('_')) {
                                        props.push(key + ': ' + data[key]);
                                    }
                                }
                                return props.join('<br>');
                            }
                            return '';
                        }
                    },
                    { 
                        "data": "properties._created_at",
                        "title": "Created At",
                        "render": function(data, type, row) {
                            if (data) {
                                return new Date(data).toLocaleString();
                            }
                            return '';
                        }
                    }
                ],
                "order": [[0, "asc"]],
                "pageLength": 25,
                "lengthMenu": [[10, 25, 50, 100], [10, 25, 50, 100]],
                "searchDelay": 500
            });

            // Reload table when node type filter changes
            $('#nodeTypeFilter').on('change', function() {
                table.ajax.reload();
            });
        });
    </script>
</body>
</html>
